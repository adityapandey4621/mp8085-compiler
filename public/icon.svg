<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)"/>
  <!-- CPU chip body -->
  <rect x="50" y="50" width="80" height="80" rx="8" fill="white" fill-opacity="0.95"/>
  <!-- CPU pins - top -->
  <rect x="65" y="38" width="6" height="16" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="80" y="38" width="6" height="16" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="95" y="38" width="6" height="16" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="110" y="38" width="6" height="16" rx="2" fill="white" fill-opacity="0.8"/>
  <!-- CPU pins - bottom -->
  <rect x="65" y="126" width="6" height="16" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="80" y="126" width="6" height="16" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="95" y="126" width="6" height="16" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="110" y="126" width="6" height="16" rx="2" fill="white" fill-opacity="0.8"/>
  <!-- CPU pins - left -->
  <rect x="38" y="65" width="16" height="6" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="38" y="80" width="16" height="6" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="38" y="95" width="16" height="6" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="38" y="110" width="16" height="6" rx="2" fill="white" fill-opacity="0.8"/>
  <!-- CPU pins - right -->
  <rect x="126" y="65" width="16" height="6" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="126" y="80" width="16" height="6" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="126" y="95" width="16" height="6" rx="2" fill="white" fill-opacity="0.8"/>
  <rect x="126" y="110" width="16" height="6" rx="2" fill="white" fill-opacity="0.8"/>
  <!-- Inner chip detail -->
  <rect x="62" y="62" width="56" height="56" rx="4" fill="url(#bgGrad)" fill-opacity="0.15" stroke="url(#bgGrad)" stroke-width="1.5"/>
  <!-- 8085 text -->
  <text x="90" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#1E40AF">8085</text>
</svg>